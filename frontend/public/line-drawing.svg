<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <!--
    Single continuous line: starts from neck bottom,
    flows up through chin, around face, past the hand,
    and trails off. Sparse, editorial, feminine.
  -->

  <!-- Main continuous stroke — neck up through face contour -->
  <path d="
    M 250 580
    C 248 540, 244 500, 240 470
    C 236 440, 230 420, 228 400
    C 225 375, 220 355, 218 340
    C 215 320, 212 305, 215 290
    C 218 272, 225 258, 238 248
    C 248 240, 260 235, 268 225
    C 278 212, 282 198, 278 185
    C 274 172, 265 165, 255 160
    C 242 155, 228 158, 215 165
    C 200 174, 188 190, 182 210
    C 178 225, 180 242, 188 258
    C 195 272, 205 278, 218 280
  " stroke="#2C2418" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="750" stroke-dashoffset="750">
    <animate attributeName="stroke-dashoffset" from="750" to="0" dur="3s" fill="freeze" begin="0.2s" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </path>

  <!-- Nose — a subtle downward curve, barely there -->
  <path d="
    M 238 215
    C 234 228, 230 242, 235 252
    Q 238 256, 242 253
  " stroke="#2C2418" stroke-width="1.2" stroke-linecap="round"
    stroke-dasharray="55" stroke-dashoffset="55">
    <animate attributeName="stroke-dashoffset" from="55" to="0" dur="0.7s" fill="freeze" begin="2.8s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- Lips — two soft curves, lightly suggested -->
  <path d="
    M 222 272
    C 230 266, 242 266, 252 270
  " stroke="#2C2418" stroke-width="1.3" stroke-linecap="round"
    stroke-dasharray="35" stroke-dashoffset="35">
    <animate attributeName="stroke-dashoffset" from="35" to="0" dur="0.4s" fill="freeze" begin="3.2s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>
  <path d="
    M 222 272
    C 232 280, 245 279, 252 270
  " stroke="#2C2418" stroke-width="1.0" stroke-linecap="round"
    stroke-dasharray="36" stroke-dashoffset="36">
    <animate attributeName="stroke-dashoffset" from="36" to="0" dur="0.4s" fill="freeze" begin="3.4s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- Hand — from right side, fingers lightly touching the face -->
  <path d="
    M 278 185
    C 290 178, 302 170, 312 160
    C 320 152, 325 142, 322 135
    C 318 128, 310 130, 308 138
    C 306 145, 310 140, 316 130
    C 322 120, 330 115, 335 120
    C 340 126, 335 138, 328 145
    C 324 150, 330 142, 338 130
    C 344 120, 352 118, 354 126
    C 356 135, 348 148, 340 155
  " stroke="#2C2418" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="380" stroke-dashoffset="380">
    <animate attributeName="stroke-dashoffset" from="380" to="0" dur="1.5s" fill="freeze" begin="1.8s" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </path>

  <!-- Arm trailing off to the right -->
  <path d="
    M 340 155
    C 355 150, 375 148, 400 150
  " stroke="#2C2418" stroke-width="0.9" stroke-linecap="round"
    stroke-dasharray="65" stroke-dashoffset="65" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="65" to="0" dur="0.5s" fill="freeze" begin="3.0s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>
</svg>
